# =============================================================================
# qiime2-pipeline 配置
# =============================================================================

# 数据目录（存放原始 fastq）
data_dir: "data"

# 输出目录
results_dir: "results"

# ---------------------------------------------------------------------------
# 样本清单 (manifest)
# 必须为 TSV 格式，列名：sample-id, forward-absolute-filepath, reverse-absolute-filepath
# 示例:
#   sample-id    forward-absolute-filepath                       reverse-absolute-filepath
#   sample_01    /abs/path/to/sample_01_L001_R1_001.fastq.gz    /abs/path/to/sample_01_L001_R2_001.fastq.gz
# ---------------------------------------------------------------------------
manifest: "data/manifest.tsv"

# ---------------------------------------------------------------------------
# 样本元数据 (用于多样性分析)
# tab 分隔，第一列为样本名，其余为分组/协变量
# ---------------------------------------------------------------------------
metadata: "data/metadata.tsv"

# ---------------------------------------------------------------------------
# GreenGenes2 物种分类器（需提前下载）
# 下载地址: https://data.qiime2.org/2024.2/classifier/sklearn/
# 选择: gg_2024_09_12_4mer_proxy_tax_classifier.qza
# ---------------------------------------------------------------------------
classifier: "envs/gg_2024_09_12_4mer_proxy_tax_classifier.qza"

# ---------------------------------------------------------------------------
# DADA2 参数
# trim_left_f/r: 5'端切除的碱基数（去除引物）
# trunc_len_f/r: 截断长度（0 表示不截断）
#   V4 区推荐: trunc_len_f=0, trunc_len_r=0, trim_left_f=17, trim_left_r=21
#   V1-V2 区推荐: trunc_len_f=240, trunc_len_r=160, trim_left_f=17, trim_left_r=21
#   具体根据你的质量图谱调整
# ---------------------------------------------------------------------------
dada2:
  trim_left_f: 20
  trim_left_r: 20
  trunc_len_f: 0
  trunc_len_r: 0
  max_ee: 2.0
  trunc_q: 2

# ---------------------------------------------------------------------------
# 多样性分析参数
# sampling_depth: 稀有化深度（建议设置为最低样本序列数的 90%）
# ---------------------------------------------------------------------------
diversity:
  sampling_depth: 1000

# ---------------------------------------------------------------------------
# 参考数据库（GreenGenes2 2024）
# ---------------------------------------------------------------------------
reference:
  green_genes: "https://data.qiime2.org/2024.2/common/gg_2024_09_12_4mer_seqs.qza"
  green_genes_tax: "https://data.qiime2.org/2024.2/common/gg_2024_09_12_4mer_tax.qza"
